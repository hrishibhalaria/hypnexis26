<script>
/* ══════════════════════════════════════════════════════
   §0  WEBGL 3D ENVIRONMENT (Three.js undulating wireframe)
   ══════════════════════════════════════════════════════ */
;(function(){
  const canvas = document.getElementById('webgl-bg');
  if(!canvas) return;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  // Topographic plane geometry
  const geometry = new THREE.PlaneGeometry(70, 70, 60, 60);

  // Wireframe material with deep blue glow
  const material = new THREE.MeshBasicMaterial({
    color: 0x1e3a8a,
    wireframe: true,
    transparent: true,
    opacity: 0.22
  });

  const mesh = new THREE.Mesh(geometry, material);
  mesh.rotation.x = -Math.PI / 2.2;
  mesh.position.y = -12;
  mesh.position.z = -12;
  scene.add(mesh);

  camera.position.z = 25;

  let targetX = 0, targetY = 0;
  window.addEventListener('mousemove', (e) => {
    targetX = (e.clientX - window.innerWidth / 2) * 0.0003;
    targetY = (e.clientY - window.innerHeight / 2) * 0.0003;
  });

  const pos = geometry.attributes.position;
  
  function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.00055;

    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const y = pos.getY(i);
      // Continuous topographic wireframe undulation
      const z = Math.sin(x * 0.12 + time) * Math.cos(y * 0.12 + time) * 2.2 +
                Math.sin(x * 0.05 - time * 0.6) * 2.5 +
                Math.cos(y * 0.08 + time * 0.35) * 1.4;
      pos.setZ(i, z);
    }
    pos.needsUpdate = true;

    // Smooth mouse parallax tilting
    mesh.rotation.y += (targetX - mesh.rotation.y) * 0.05;
    mesh.rotation.x += ((-Math.PI / 2.2 + targetY) - mesh.rotation.x) * 0.05;

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
})();


/* ══════════════════════════════════════════════════════
   §1  3D TUNNEL STARFIELD
   ══════════════════════════════════════════════════════ */
;(function(){
  const c=document.getElementById('tunnel'),x=c.getContext('2d');
  let W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  addEventListener('resize',resize);resize();

  const N=Math.min(200,Math.round(W*H/10000)),FOV=600,MZ=2000;
  const cfg={speed:1.8};window.__p=cfg;

  class S{
    constructor(i){this.reset(i)}
    reset(i){
      this.x=(Math.random()-.5)*W*1.6;
      this.y=(Math.random()-.5)*H*1.6;
      this.z=i?Math.random()*MZ+100:MZ+Math.random()*500;
      this.pz=this.z;this.h=210+Math.random()*28;
    }
    update(s){this.pz=this.z;this.z-=s;if(this.z<=1)this.reset(false)}
    draw(){
      const cx=W/2,cy=H/2,s=FOV/this.z,sx=this.x*s+cx,sy=this.y*s+cy;
      if(sx<-60||sx>W+60||sy<-60||sy>H+60)return;
      const ps=FOV/this.pz,px=this.x*ps+cx,py=this.y*ps+cy;
      const l=1-this.z/MZ,a=Math.min(.65,l*.75),r=Math.max(.2,1.6*s);
      if(a<.03)return;
      x.beginPath();x.moveTo(px,py);x.lineTo(sx,sy);
      x.strokeStyle=`hsla(${this.h},70%,65%,${a*.35})`;x.lineWidth=Math.max(.3,r*.55);x.stroke();
      x.beginPath();x.arc(sx,sy,r*2.8,0,6.283);
      x.fillStyle=`hsla(${this.h},80%,60%,${a*.07})`;x.fill();
      x.beginPath();x.arc(sx,sy,r,0,6.283);
      x.fillStyle=`hsla(${this.h},55%,82%,${a})`;x.fill();
    }
  }

  // Digital Ash: Reverse Gravity Sparks drifting down
  class Ash {
    constructor() { this.reset() }
    reset() {
      this.x = Math.random() * W;
      this.y = -10 - Math.random() * 20;
      this.vy = 0.4 + Math.random() * 0.8;
      this.vx = (Math.random() - 0.5) * 0.25;
      this.size = 0.8 + Math.random() * 1.4;
      this.maxLife = 140 + Math.random() * 160;
      this.life = this.maxLife;
      this.h = 195 + Math.random() * 25;
    }
    update() {
      this.y += this.vy;
      this.x += this.vx;
      this.life--;
      if (this.life <= 0 || this.y > H * 0.65) this.reset();
    }
    draw() {
      const alpha = (this.life / this.maxLife) * 0.3 * (1 - (this.y / (H * 0.65)));
      if (alpha <= 0) return;
      x.beginPath();
      x.arc(this.x, this.y, this.size, 0, 6.283);
      x.fillStyle = `hsla(${this.h}, 85%, 75%, ${alpha})`;
      x.fill();
    }
  }

  const st=Array.from({length:N},()=>new S(true));
  const ashes=Array.from({length:40},()=>new Ash());

  ;(function loop(){
    x.clearRect(0,0,W,H);
    const sp=cfg.speed;
    for(let i=0;i<st.length;i++){st[i].update(sp);st[i].draw()}
    for(let i=0;i<ashes.length;i++){ashes[i].update();ashes[i].draw()}
    requestAnimationFrame(loop);
  })();
})();


/* ══════════════════════════════════════════════════════
   §2  AUDIO ENGINE  (Web Audio — cinematic synthesis)
   ══════════════════════════════════════════════════════ */
class AE{
  constructor(){
    const AC=window.AudioContext||window.webkitAudioContext;
    this.x=new AC();
    const cp=this.x.createDynamicsCompressor();
    cp.threshold.value=-16;cp.knee.value=8;cp.ratio.value=5;cp.attack.value=.003;cp.release.value=.12;
    cp.connect(this.x.destination);
    this.m=this.x.createGain();this.m.gain.value=.32;this.m.connect(cp);
    this.rv=this._mkR(4,1.8);this.rvG=this.x.createGain();this.rvG.gain.value=.4;
    this.rv.connect(this.rvG);this.rvG.connect(this.m);
    this._nb=this._mkN(3);
  }
  _mkN(d){const l=this.x.sampleRate*d,b=this.x.createBuffer(1,l,this.x.sampleRate),a=b.getChannelData(0);for(let i=0;i<l;i++)a[i]=Math.random()*2-1;return b}
  _mkR(d,dc){const l=this.x.sampleRate*d,b=this.x.createBuffer(2,l,this.x.sampleRate);for(let c=0;c<2;c++){const a=b.getChannelData(c);for(let i=0;i<l;i++)a[i]=(Math.random()*2-1)*Math.pow(1-i/l,dc)}const v=this.x.createConvolver();v.buffer=b;return v}

  _o(type,freq,dur,vol,atk=.1,rel=.3,rv=0){
    const t=this.x.currentTime,o=this.x.createOscillator(),g=this.x.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+atk);
    if(dur-rel>atk)g.gain.setValueAtTime(vol,t+dur-rel);
    g.gain.linearRampToValueAtTime(0,t+dur);
    o.connect(g);g.connect(this.m);
    if(rv>0){const r=this.x.createGain();r.gain.value=rv;g.connect(r);r.connect(this.rv)}
    o.start(t);o.stop(t+dur+.2);return o;
  }
  _n(dur,vol,freq=2e3,q=1,rv=0){
    const t=this.x.currentTime,s=this.x.createBufferSource();s.buffer=this._nb;
    const f=this.x.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;f.Q.value=q;
    const g=this.x.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    s.connect(f);f.connect(g);g.connect(this.m);
    if(rv>0){const r=this.x.createGain();r.gain.value=rv;g.connect(r);r.connect(this.rv)}
    s.start(t);s.stop(t+dur+.1);
  }
  _sw(dur,vol,f1,f2,type='bandpass',q=.8,rv=0){
    const t=this.x.currentTime,s=this.x.createBufferSource();s.buffer=this._nb;
    const f=this.x.createBiquadFilter();f.type=type;f.Q.value=q;
    f.frequency.setValueAtTime(f1,t);f.frequency.exponentialRampToValueAtTime(f2,t+dur);
    const g=this.x.createGain();g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+dur*.3);g.gain.linearRampToValueAtTime(0,t+dur);
    s.connect(f);f.connect(g);g.connect(this.m);
    if(rv>0){const r=this.x.createGain();r.gain.value=rv;g.connect(r);r.connect(this.rv)}
    s.start(t);s.stop(t+dur+.1);
  }

  /* Scene 0: violent reverse-vacuum implosion */
  vacuum(){
    const t=this.x.currentTime;
    const s=this.x.createBufferSource();s.buffer=this._nb;
    const f=this.x.createBiquadFilter();f.type='bandpass';f.Q.value=6;
    f.frequency.setValueAtTime(12000,t);f.frequency.exponentialRampToValueAtTime(15,t+.3);
    const g=this.x.createGain();g.gain.setValueAtTime(.55,t);
    g.gain.setValueAtTime(.55,t+.18);g.gain.linearRampToValueAtTime(0,t+.32);
    s.connect(f);f.connect(g);g.connect(this.m);s.start(t);s.stop(t+.35);
    this._o('sine',25,.3,.5,.002,.25);
    const w=this.x.createOscillator();w.type='sine';
    w.frequency.setValueAtTime(5000,t);w.frequency.exponentialRampToValueAtTime(18,t+.28);
    const wg=this.x.createGain();wg.gain.setValueAtTime(.07,t);wg.gain.exponentialRampToValueAtTime(.001,t+.3);
    w.connect(wg);wg.connect(this.m);w.start(t);w.stop(t+.32);
  }

  /* Scene 1: massive sub-bass drone */
  s1(){
    this._o('sine',22,5.5,.50,2,1.8);
    this._o('sine',44,5.5,.40,1.8,1.8);
    this._o('sine',66,5,.18,1.5,1.5);
    this._sw(4,.05,80,2000,'bandpass',.6);
  }
  /* Scene 2: heartbeat thud + swell */
  s2(){
    this._o('sine',38,1.2,.50,.005,1);this._n(.08,.30,800,2,.3);
    setTimeout(()=>{this._o('sine',38,1,.30,.005,.8);this._n(.06,.18,900,2,.2)},350);
    this._o('triangle',165,3.8,.05,1.5,1.2,.4);
    this._o('triangle',220,3.8,.04,1.8,1.2,.3);
  }
  /* Scene 3: synth blast + vacuum wind */
  s3(){
    this._o('sawtooth',80,1.5,.18,.005,1.2,.3);
    this._o('square',80,1.2,.10,.005,1,.2);
    this._o('sine',40,2.5,.35,.005,2);
    this._n(.15,.25,1500,3,.5);
    setTimeout(()=>this._sw(2,.12,5000,80,'bandpass',1.5,.4),1500);
  }
  /* Scene 4: thunderous boom */
  s4o(){
    this._o('sine',22,3,.60,.003,2.5);this._o('sine',44,2.5,.50,.003,2);

/* ══════════════════════════════════════════════════════

  function runCounter(cb){
